{
   "jobs" : {
      "batch_github_master" : {
         "if" : "${{ github.ref == 'refs/heads/master' }}",
         "runs-on" : "ubuntu-latest",
         "steps" : [
            {
               "uses" : "actions/checkout@v2",
               "with" : {
                  "fetch-depth" : 0,
                  "ref" : "master",
                  "ssh-key" : "${{ secrets.GH_GIT_KEY }}"
               }
            },
            {
               "run" : "git config --global user.name \u0022GitHub Actions\u0022"
            },
            {
               "run" : "git config --global user.email \u0022temp@github.test\u0022"
            },
            {
               "run" : "make deps"
            },
            {
               "run" : "docker build -t quay\u005C.io\u005C/suikawiki\u005C/swfonts\u005C:swcf \u005C."
            },
            {
               "run" : "make updatenightly"
            },
            {
               "run" : "git diff-index --quiet HEAD --cached || git commit -m auto"
            },
            {
               "run" : "git push origin \u002B`git rev-parse HEAD`:refs/heads/nightly"
            },
            {
               "env" : {
                  "DOCKER_PASS" : "${{ secrets.DOCKER_PASS }}",
                  "DOCKER_USER" : "${{ secrets.DOCKER_USER }}"
               },
               "if" : "${{ github.ref == 'refs/heads/master' }}",
               "run" : "docker login -u $DOCKER_USER -p $DOCKER_PASS quay\u005C.io"
            },
            {
               "if" : "${{ github.ref == 'refs/heads/master' }}",
               "run" : "docker push quay\u005C.io\u005C/suikawiki\u005C/swfonts\u005C:swcf"
            },
            {
               "env" : {
                  "BWALLER_URL" : "${{ secrets.BWALLER_URL }}"
               },
               "if" : "${{ github.ref == 'refs/heads/master' }}",
               "run" : "curl -sSf $BWALLER_URL | BWALL_GROUP=docker BWALL_NAME=quay.io/suikawiki/swfonts:swcf bash"
            }
         ]
      }
   },
   "name" : "cron",
   "on" : {
      "schedule" : [
         {
            "cron" : "34 2 * * *"
         }
      ]
   }
}
